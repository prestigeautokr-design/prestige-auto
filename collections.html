<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestige Auto KR — Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=Noto+Sans+Arabic:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--black:#0A0A0A;--white:#FAFAF8;--gray:#F5F4F0;--muted:#888}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--white);color:var(--black);overflow-x:hidden}
body.lang-ko{font-family:'Noto Sans KR',sans-serif}
body.lang-ar{font-family:'Noto Sans Arabic',sans-serif}
a{text-decoration:none;color:inherit}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(250,250,248,0.97);border-bottom:1px solid rgba(201,168,76,0.2)}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:0.15em}
.logo span{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:0.8rem}
select{font-size:0.85rem;border:1px solid rgba(201,168,76,0.4);background:transparent;padding:0.45rem 0.9rem;cursor:pointer;outline:none;font-family:inherit;color:black}
.nav-back{font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.7rem 1.6rem;background:var(--black);color:white;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:background 0.3s;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-back:hover{background:var(--gold)}

.page-hero{
  margin-top:58px;padding:5rem 3rem 3rem;
  background:var(--black);color:white;
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:2rem;
}
.page-hero-title{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.8rem}
.page-hero h1{font-size:3.5rem;font-weight:300;line-height:1.1}
.page-hero h1 span{color:var(--gold);font-style:italic}
.hero-count{text-align:right}
.hero-count-num{font-size:3rem;font-weight:300;color:var(--gold)}
.hero-count-lbl{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4)}

.filters-bar{
  position:sticky;top:58px;z-index:50;
  background:var(--gray);padding:1rem 3rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  border-bottom:1px solid rgba(0,0,0,0.08);
}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.f-tag{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 14px;border:1px solid rgba(0,0,0,0.15);cursor:pointer;transition:all 0.2s;background:white;color:var(--muted)}
.f-tag:hover,.f-tag.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.07)}
.f-divider{width:1px;height:24px;background:rgba(0,0,0,0.1)}
.f-input{border:1px solid rgba(0,0,0,0.15);padding:5px 14px;font-family:inherit;font-size:0.85rem;outline:none;background:white;color:black;transition:border-color 0.2s;min-width:200px}
.f-input:focus{border-color:var(--gold)}
.f-input::placeholder{color:#bbb}
.f-select{border:1px solid rgba(0,0,0,0.15);padding:5px 14px;font-family:inherit;font-size:0.82rem;outline:none;background:white;color:black;cursor:pointer}
.results-info{font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-left:auto}

.cars-section{padding:3rem}
.cars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2px;background:rgba(0,0,0,0.06)}
.car-card{background:white;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s}
.car-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.12);z-index:2}
.car-thumb{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.car-abbr{font-size:4rem;font-weight:300;color:rgba(0,0,0,0.07);letter-spacing:0.05em}
.car-src{position:absolute;top:10px;left:10px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;background:rgba(250,250,248,0.95);padding:4px 10px;color:var(--muted)}
.car-new{position:absolute;top:10px;right:10px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;background:var(--gold);padding:4px 10px;color:#000;font-weight:700}
.car-body{padding:1.5rem 1.8rem}
.car-brand{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem}
.car-name{font-size:1.4rem;font-weight:600;margin-bottom:0.2rem;color:black}
.car-year{font-size:0.85rem;color:var(--muted)}
.car-specs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,0.06)}
.spec-item{text-align:center}
.spec-l{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.spec-v{font-size:0.8rem;font-weight:600;color:black}
.car-foot{display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,0.06)}
.car-price{font-size:1.1rem;font-weight:700}
.car-actions{display:flex;gap:6px}
.btn-encar{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border:1px solid rgba(201,168,76,0.4);color:var(--gold);background:transparent;cursor:pointer;transition:all 0.2s;text-decoration:none}
.btn-encar:hover{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-inquiry{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border:none;background:var(--black);color:white;cursor:pointer;transition:background 0.2s;text-decoration:none}
.btn-inquiry:hover{background:var(--gold)}

.empty-state{grid-column:1/-1;text-align:center;padding:6rem 0;color:var(--muted)}
.empty-icon{font-size:4rem;opacity:0.2;margin-bottom:1rem}
.empty-text{font-size:0.9rem;letter-spacing:0.15em;text-transform:uppercase}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2rem;border-bottom:1px solid rgba(0,0,0,0.08)}
.modal-brand{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold)}
.modal-name{font-size:1.8rem;font-weight:300;line-height:1.1}
.modal-close{background:none;border:1px solid rgba(0,0,0,0.12);width:36px;height:36px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#c0392b;color:white;border-color:#c0392b}
.modal-thumb{width:100%;height:240px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:2rem}
.modal-specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(0,0,0,0.06);margin-bottom:1.5rem}
.mspec{background:white;padding:1rem;text-align:center}
.mspec-l{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mspec-v{font-size:0.95rem;font-weight:600}
.modal-price-row{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;background:var(--gray);margin-bottom:1.5rem;border-left:3px solid var(--gold)}
.modal-price{font-size:2.2rem;font-weight:700}
.modal-btns{display:flex;gap:10px;flex-wrap:wrap}
.modal-btns a{flex:1;min-width:140px;text-align:center;padding:1rem 1.5rem;font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.2s}

@media(max-width:768px){
  nav{padding:1rem 1.2rem}
  .page-hero{padding:3rem 1.5rem 2rem}
  .page-hero h1{font-size:2.5rem}
  .filters-bar{padding:1rem 1.5rem}
  .cars-section{padding:2rem 1.5rem}
  .cars-grid{grid-template-columns:1fr}
  .modal-specs-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">PRESTIGE <span>AUTO</span> KR</a>
  <div class="nav-right">
    <select onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="ru">RU</option>
      <option value="ar">AR</option>
      <option value="ko">KO</option>
    </select>
    <select onchange="setCur(this.value)">
      <option value="KRW">₩ KRW</option>
      <option value="USD">$ USD</option>
      <option value="EUR">€ EUR</option>
      <option value="AED">AED</option>
      <option value="RUB">₽ RUB</option>
    </select>
    <a href="index.html" class="nav-back">← <span id="back-txt">Back to Home</span></a>
  </div>
</nav>

<div class="page-hero">
  <div>
    <div class="page-hero-title" id="col-tag">Full Collection</div>
    <h1>All <span>Vehicles</span></h1>
  </div>
  <div class="hero-count">
    <div class="hero-count-num" id="totalCount">0</div>
    <div class="hero-count-lbl" id="totalLbl">Cars Available</div>
  </div>
</div>

<div class="filters-bar">
  <div class="filter-group" id="typeFilters">
    <span class="f-tag active" onclick="setFilter('all',this)" id="ft-all">All</span>
    <span class="f-tag" onclick="setFilter('sedan',this)" id="ft-sedan">Sedan</span>
    <span class="f-tag" onclick="setFilter('suv',this)" id="ft-suv">SUV</span>
    <span class="f-tag" onclick="setFilter('luxury',this)" id="ft-luxury">Luxury</span>
    <span class="f-tag" onclick="setFilter('electric',this)" id="ft-electric">Electric</span>
    <span class="f-tag" onclick="setFilter('hybrid',this)" id="ft-hybrid">Hybrid</span>
  </div>
  <div class="f-divider"></div>
  <input class="f-input" id="searchInput" placeholder="Search brand, model..." oninput="renderCars()">
  <select class="f-select" id="sortSelect" onchange="renderCars()">
    <option value="default">Default</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="year-desc">Newest First</option>
    <option value="mileage-asc">Lowest Mileage</option>
  </select>
  <span class="results-info" id="resultsInfo"></span>
</div>

<section class="cars-section">
  <div class="cars-grid" id="carsGrid"></div>
</section>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-brand" id="mBrand"></div><div class="modal-name" id="mName"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-thumb" id="mThumb"></div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
const R={KRW:1,USD:0.00075,EUR:0.00069,AED:0.00275,RUB:0.068};
const S={KRW:'₩',USD:'$',EUR:'€',AED:'AED ',RUB:'₽'};
let cur='KRW', lang='en', typeFilter='all';

function fmt(krw,c){c=c||cur;return S[c]+Math.round(krw*R[c]).toLocaleString()}

const BG=[
  'linear-gradient(145deg,#EDEBE5,#D8D4CC)','linear-gradient(145deg,#E0E0D8,#CACABE)',
  'linear-gradient(145deg,#E8E2D8,#D6CFC2)','linear-gradient(145deg,#E5E3DC,#D2CFCA)',
  'linear-gradient(145deg,#E2E0D9,#CECCC4)','linear-gradient(145deg,#E6E1D5,#D5CEBC)',
  'linear-gradient(145deg,#DDE4EC,#C8D4E0)','linear-gradient(145deg,#E8E6E0,#D5D2CB)',
];
function getAbbr(b,m){return((b||'').replace(/[^A-Za-z]/g,'').substring(0,3)+(m||'').replace(/[^A-Za-z]/g,'').substring(0,1)).toUpperCase()||'CAR'}

function loadCars(){
  try{
    const stored=localStorage.getItem('pak_cars');
    if(stored){
      const cars=JSON.parse(stored);
      return cars.filter(c=>c.active!==false).map((c,i)=>({...c,abbr:getAbbr(c.brand,c.model),bg:BG[i%BG.length]}));
    }
  }catch(e){}
  return [
    {id:'c1',brand:'Mercedes-Benz',model:'E-Class 300',year:2024,type:'sedan',krw:78000000,mileage:8200,engine:'2.0T',fuel:'Gasoline',trans:'Auto 9',color:'Black',drive:'RWD',src:'🇰🇷 Encar',encar:'https://www.encar.com',abbr:'MBZ',bg:BG[0]},
    {id:'c2',brand:'Lexus',model:'LX 600',year:2024,type:'suv',krw:125000000,mileage:12000,engine:'3.5T',fuel:'Gasoline',trans:'Auto 10',color:'White',drive:'4WD',src:'🇯🇵 Hey Dealer',encar:'https://www.heydealer.com',abbr:'LX6',bg:BG[1]},
    {id:'c3',brand:'Genesis',model:'G90',year:2024,type:'luxury',krw:95000000,mileage:4500,engine:'3.5T',fuel:'Gasoline',trans:'Auto 8',color:'Silver',drive:'AWD',src:'🇰🇷 KB CCC',encar:'https://www.kbchachacha.com',abbr:'G90',bg:BG[2]},
    {id:'c4',brand:'BMW',model:'7 Series 740i',year:2023,type:'luxury',krw:89000000,mileage:15000,engine:'3.0T',fuel:'Gasoline',trans:'Auto 8',color:'Black',drive:'RWD',src:'🇰🇷 Encar',encar:'https://www.encar.com',abbr:'BMW',bg:BG[3]},
    {id:'c5',brand:'Toyota',model:'Land Cruiser 300',year:2024,type:'suv',krw:110000000,mileage:6000,engine:'3.5T',fuel:'Gasoline',trans:'Auto 10',color:'White',drive:'4WD',src:'🇯🇵 Hey Dealer',encar:'https://www.heydealer.com',abbr:'LC3',bg:BG[4]},
    {id:'c6',brand:'Porsche',model:'Cayenne S',year:2024,type:'luxury',krw:142000000,mileage:9200,engine:'2.9T',fuel:'Gasoline',trans:'PDK 8',color:'Grey',drive:'AWD',src:'🇰🇷 KB CCC',encar:'https://www.kbchachacha.com',abbr:'PCY',bg:BG[5]},
    {id:'c7',brand:'Kia',model:'EV6 GT',year:2023,type:'electric',krw:62000000,mileage:8000,engine:'77.4 kWh',fuel:'Electric',trans:'Single Speed',color:'Moonscape',drive:'AWD',src:'🇰🇷 Encar',encar:'https://www.encar.com',abbr:'EV6',bg:BG[6]},
    {id:'c8',brand:'Genesis',model:'GV80',year:2023,type:'luxury',krw:72000000,mileage:19000,engine:'2.5T',fuel:'Gasoline',trans:'Auto 8',color:'Savile Silver',drive:'AWD',src:'🇰🇷 Encar',encar:'https://www.encar.com',abbr:'GV8',bg:BG[7]},
  ];
}

let ALL_CARS = loadCars();

function renderCars(){
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let cars = ALL_CARS.filter(c=>{
    const mt = typeFilter==='all' || c.type===typeFilter;
    const ms = !search || (c.brand+' '+c.model+' '+c.year).toLowerCase().includes(search);
    return mt && ms;
  });
  if(sort==='price-asc') cars.sort((a,b)=>a.krw-b.krw);
  else if(sort==='price-desc') cars.sort((a,b)=>b.krw-a.krw);
  else if(sort==='year-desc') cars.sort((a,b)=>b.year-a.year);
  else if(sort==='mileage-asc') cars.sort((a,b)=>(a.mileage||0)-(b.mileage||0));

  document.getElementById('totalCount').textContent = ALL_CARS.length;
  document.getElementById('resultsInfo').textContent = cars.length + ' results';
  const grid = document.getElementById('carsGrid');
  if(!cars.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🚗</div><div class="empty-text">No cars found</div></div>`;
    return;
  }
  grid.innerHTML = cars.map(c=>`
    <div class="car-card" onclick="openModal('${c.id}')">
      <div class="car-thumb" style="background:${c.bg}">
        <span class="car-abbr">${c.abbr}</span>
        <span class="car-src">${c.src}</span>
      </div>
      <div class="car-body">
        <div class="car-brand">${c.brand}</div>
        <div class="car-name">${c.model}</div>
        <div class="car-year">${c.year}</div>
        <div class="car-specs">
          <div class="spec-item"><div class="spec-l">Mileage</div><div class="spec-v">${(c.mileage||0).toLocaleString()} km</div></div>
          <div class="spec-item"><div class="spec-l">Engine</div><div class="spec-v">${c.engine||'—'}</div></div>
          <div class="spec-item"><div class="spec-l">Drive</div><div class="spec-v">${c.drive||'—'}</div></div>
        </div>
        <div class="car-foot">
          <div class="car-price">${fmt(c.krw)}</div>
          <div class="car-actions">
            ${c.encar?`<a href="${c.encar}" target="_blank" class="btn-encar" onclick="event.stopPropagation()">Encar ↗</a>`:''}
            <a href="https://wa.me/821083434464?text=${encodeURIComponent(c.brand+' '+c.model+' '+c.year)}" target="_blank" class="btn-inquiry" onclick="event.stopPropagation()">Inquiry</a>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function setFilter(type, el){
  typeFilter = type;
  document.querySelectorAll('.f-tag').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderCars();
}

function openModal(id){
  const c = ALL_CARS.find(x=>x.id===id); if(!c) return;
  document.getElementById('mBrand').textContent = c.brand;
  document.getElementById('mName').textContent = c.model+' '+c.year;
  const th = document.getElementById('mThumb');
  th.style.background = c.bg;
  th.innerHTML = `<span style="font-size:5rem;font-weight:300;color:rgba(0,0,0,0.07)">${c.abbr}</span>`;
  document.getElementById('mBody').innerHTML = `
    <div class="modal-specs-grid">
      <div class="mspec"><div class="mspec-l">Year</div><div class="mspec-v">${c.year}</div></div>
      <div class="mspec"><div class="mspec-l">Mileage</div><div class="mspec-v">${(c.mileage||0).toLocaleString()} km</div></div>
      <div class="mspec"><div class="mspec-l">Engine</div><div class="mspec-v">${c.engine||'—'}</div></div>
      <div class="mspec"><div class="mspec-l">Fuel</div><div class="mspec-v">${c.fuel||'—'}</div></div>
      <div class="mspec"><div class="mspec-l">Trans</div><div class="mspec-v">${c.trans||'—'}</div></div>
      <div class="mspec"><div class="mspec-l">Drive</div><div class="mspec-v">${c.drive||'—'}</div></div>
      <div class="mspec"><div class="mspec-l">Color</div><div class="mspec-v">${c.color||'—'}</div></div>
      <div class="mspec"><div class="mspec-l">Type</div><div class="mspec-v" style="text-transform:capitalize">${c.type}</div></div>
      <div class="mspec"><div class="mspec-l">Source</div><div class="mspec-v">${c.src||'—'}</div></div>
    </div>
    <div class="modal-price-row">
      <div><div style="font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Price</div>
      <div class="modal-price">${fmt(c.krw)}</div></div>
      ${c.encar?`<a href="${c.encar}" target="_blank" class="btn-encar">View on Platform ↗</a>`:''}
    </div>
    ${c.desc?`<p style="font-size:0.9rem;line-height:1.8;color:var(--muted);margin-bottom:1.5rem">${c.desc}</p>`:''}
    <div class="modal-btns">
      <a href="https://wa.me/821083434464?text=${encodeURIComponent(c.brand+' '+c.model+' '+c.year)}" target="_blank" style="background:var(--black);color:white">💬 WhatsApp</a>
      <a href="https://t.me/prestigeauto_kr?text=${encodeURIComponent(c.brand+' '+c.model+' '+c.year)}" target="_blank" style="background:transparent;border:1px solid rgba(0,0,0,0.15);color:var(--black)">✈ Telegram</a>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function setLang(l){
  lang=l;
  document.body.style.direction=l==='ar'?'rtl':'ltr';
  document.body.className=l==='ko'?'lang-ko':l==='ar'?'lang-ar':'';
}
function setCur(c){ cur=c; renderCars(); }

renderCars();
</script>
</body>
</html>
